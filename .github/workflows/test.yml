name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout flake-analysis-core (sibling)
        uses: actions/checkout@v4
        with:
          repository: HoukJangBNL/flake-analysis-core
          path: flake-analysis-core
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install sibling
        run: pip install -e ./flake-analysis-core
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest -v
